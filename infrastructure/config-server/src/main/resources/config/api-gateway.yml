eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: zone-service
              uri: lb://ZONE-SERVICE
              predicates:
                - Path=/api/zones/**
            - id: crop-service
              uri: lb://CROP-SERVICE
              predicates:
                - Path=/api/crops/**
            - id: sensor-service
              uri: lb://SENSOR-SERVICE
              predicates:
                - Path=/api/sensors/**
jwt:
  secret: ${JWT_SECRET:432A462D4A614E645267556B58703273357638792F423F4528482B4D62516554}